project_root: .

languages:
  - python
  - typescript
  - javascript
  - go
  - java
  - c
  - cpp

paths:
  code:
    - .
  schema:
    - db
    - src/db
  requirements:
    - artifacts/requirements
  policies:
    - artifacts/policies
  rbac:
    - artifacts/rbac
  backend:
    - src
    - server
    - app
  identifiers: []

ignore:
  - .git
  - .next
  - __pycache__
  - node_modules
  - venv
  - .venv
  - dist
  - build
  - coverage
  - .idea
  - .vscode
  - .DS_Store
  - "*.log"
  - "*.tmp"
  - "*.bak"

aliases: {}

neo4j:
  uri: bolt://localhost:7687
  user: neo4j
  password: testpassword

# RBAC is disabled by default for local development.
# Set enabled: true and configure JWT settings when using Keycloak.
rbac:
  enabled: false
  enforce_mode: advisory
  deny_default: true
  jwt_issuer: http://localhost:8080/realms/uce-realm
  jwt_audience: uce-mcp
  jwks_uri: http://localhost:8080/realms/uce-realm/protocol/openid-connect/certs
  clock_skew_seconds: 60
