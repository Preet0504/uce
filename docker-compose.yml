services:
  neo4j:
    image: neo4j:5.26
    container_name: uce-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-testpassword}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-testpassword} 'RETURN 1;' || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.8
    container_name: uce-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  neo4j-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uce-neo4j-mcp
    restart: unless-stopped
    command:
      [
        "neo4j-mcp",
        "--transport",
        "http",
        "--server-host",
        "0.0.0.0",
        "--server-port",
        "8000",
        "--server-path",
        "/mcp/",
        "--db-url",
        "bolt://neo4j:7687",
        "--username",
        "${NEO4J_USER:-neo4j}",
        "--password",
        "${NEO4J_PASSWORD:-testpassword}",
        "--database",
        "${NEO4J_DATABASE:-neo4j}"
      ]
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "${NEO4J_MCP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  uce:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uce-engine
    restart: unless-stopped
    command: ["uce", "--config", "/workspace/config.yaml"]
    depends_on:
      neo4j:
        condition: service_healthy
      neo4j-mcp:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER:-neo4j}"
      NEO4J_USERNAME: "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-testpassword}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      NEO4J_TRANSPORT_MODE: "http"
      NEO4J_MCP_HTTP_URL: "http://neo4j-mcp:8000/mcp/"

      UCE_MCP_TRANSPORT: "http"
      UCE_MCP_SERVER_HOST: "0.0.0.0"
      UCE_MCP_SERVER_PORT: "9001"
      UCE_MCP_SERVER_PATH: "/mcp/"

      RBAC_ENABLED: "${RBAC_ENABLED:-true}"
      RBAC_ENFORCE_MODE: "${RBAC_ENFORCE_MODE:-enforced}"
      RBAC_DENY_DEFAULT: "${RBAC_DENY_DEFAULT:-true}"
      RBAC_JWT_ISSUER: "${RBAC_JWT_ISSUER:-http://localhost:8080/realms/${KEYCLOAK_REALM:-uce-realm}}"
      RBAC_JWT_AUDIENCE: "${RBAC_JWT_AUDIENCE:-uce-mcp}"
      RBAC_JWKS_URI: "${RBAC_JWKS_URI:-http://keycloak:8080/realms/${KEYCLOAK_REALM:-uce-realm}/protocol/openid-connect/certs}"
      RBAC_CLOCK_SKEW_SECONDS: "${RBAC_CLOCK_SKEW_SECONDS:-60}"

      LLM_PROVIDER: "${LLM_PROVIDER:-openai}"
      LLM_FALLBACK: "${LLM_FALLBACK:-openai}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      LOCAL_LLM_BASE_URL: "${LOCAL_LLM_BASE_URL:-}"
      LOCAL_LLM_API_KEY: "${LOCAL_LLM_API_KEY:-}"
      LOCAL_LLM_MODEL: "${LOCAL_LLM_MODEL:-}"
    ports:
      - "${UCE_MCP_PORT:-9001}:9001"
    volumes:
      - ./docker/uce.config.yaml:/workspace/config.yaml:ro
      - ${UCE_TARGET_REPO:-.}:/workspace/target
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 9001), 2); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  neo4j_data:
  neo4j_logs:
  keycloak_data:

