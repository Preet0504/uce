project_root: /workspace/target

languages:
  - python
  - typescript
  - javascript
  - go
  - java
  - c
  - cpp

paths:
  code:
    - .
  schema:
    - db
    - src/db
  requirements:
    - requirements
    - src/requirements
    - artifacts/requirements
  policies:
    - policies
    - src/policies
    - artifacts/policies
  rbac:
    - rbac
    - src/rbac
    - artifacts/rbac
  backend:
    - src
    - server
    - app
  identifiers: []

ignore:
  - .git
  - .next
  - __pycache__
  - node_modules
  - venv
  - .venv
  - dist
  - build
  - coverage
  - .idea
  - .vscode
  - .DS_Store
  - "*.log"
  - "*.tmp"
  - "*.bak"

aliases: {}

neo4j:
  uri: bolt://neo4j:7687
  user: neo4j
  password: testpassword

rbac:
  enabled: true
  enforce_mode: enforced
  deny_default: true
  jwt_issuer: http://localhost:8080/realms/uce-realm
  jwt_audience: uce-mcp
  jwks_uri: http://keycloak:8080/realms/uce-realm/protocol/openid-connect/certs
  clock_skew_seconds: 60

gate:
  enforcement: enforced
  strict_default: true
  token_ttl_seconds: 900
